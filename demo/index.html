<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR Blackbox — Live Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0a;color:#e0e0e0;font-family:'JetBrains Mono','Fira Code','Courier New',monospace;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}#terminal{width:900px;max-width:95vw;background:#1a1a2e;border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5)}#titlebar{background:#16213e;padding:10px 16px;display:flex;align-items:center;gap:8px}.dot{width:12px;height:12px;border-radius:50%}.dot.red{background:#ff5f57}.dot.yellow{background:#ffbd2e}.dot.green{background:#28c840}#titlebar span{margin-left:12px;color:#888;font-size:13px}#screen{padding:20px;min-height:480px;max-height:70vh;overflow-y:auto;font-size:14px;line-height:1.6}#screen::-webkit-scrollbar{width:6px}#screen::-webkit-scrollbar-track{background:#1a1a2e}#screen::-webkit-scrollbar-thumb{background:#333;border-radius:3px}.prompt{color:#28c840}.cmd{color:#fff}.dim{color:#666}.green{color:#28c840}.red{color:#ff5f57}.yellow{color:#ffbd2e}.cyan{color:#00bcd4}.white{color:#fff;font-weight:bold}.bold{font-weight:bold}.line{white-space:pre}#narration-bar{width:900px;max-width:95vw;margin-top:16px;padding:12px 20px;background:#16213e;border-radius:8px;display:flex;align-items:center;gap:12px;min-height:52px}#narration-text{color:#aaa;font-size:13px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;flex:1;font-style:italic}#speaker-icon{font-size:20px;opacity:0.5;transition:opacity 0.3s}#speaker-icon.speaking{opacity:1.0}#controls{width:900px;max-width:95vw;margin-top:16px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}button{padding:10px 28px;border:none;border-radius:8px;font-size:15px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;cursor:pointer;transition:all 0.2s}#startBtn{background:#f97316;color:#fff;font-weight:600}#startBtn:hover{background:#ea580c}#startBtn:disabled{opacity:0.4;cursor:not-allowed}#voiceToggle{background:#2a2a3e;color:#aaa;border:1px solid #444}#voiceToggle:hover{background:#333}#voiceToggle.active{border-color:#f97316;color:#f97316}#speedSelect,#apiKey{background:#2a2a3e;color:#aaa;border:1px solid #444;border-radius:8px;padding:10px 16px;font-size:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
</style>
</head>
<body>
<div id="terminal"><div id="titlebar"><div class="dot red"></div><div class="dot yellow"></div><div class="dot green"></div><span>bash — AIR Blackbox Demo</span></div><div id="screen"></div></div>
<div id="narration-bar"><span id="speaker-icon">🔊</span><span id="narration-text">Press Start Demo to begin</span></div>
<div id="controls"><input id="apiKey" type="password" placeholder="OpenAI API Key (optional)" style="width:220px"><button id="startBtn" onclick="startDemo()">▶ Start Demo</button><button id="voiceToggle" class="active" onclick="toggleVoice()">🔊 Voice On</button><select id="speedSelect"><option value="0.5">0.5x</option><option value="0.75">0.75x</option><option value="1" selected>1x</option><option value="1.5">1.5x</option><option value="2">2x</option></select></div>
<script>
const screen=document.getElementById('screen'),narrationText=document.getElementById('narration-text'),speakerIcon=document.getElementById('speaker-icon'),startBtn=document.getElementById('startBtn');let voiceEnabled=true,running=false,currentAudio=null;
function toggleVoice(){voiceEnabled=!voiceEnabled;const b=document.getElementById('voiceToggle');b.textContent=voiceEnabled?'🔊 Voice On':'🔇 Voice Off';b.classList.toggle('active',voiceEnabled);if(!voiceEnabled&&currentAudio){currentAudio.pause();currentAudio=null}}
function getSpeed(){return parseFloat(document.getElementById('speedSelect').value)}
function sleep(ms){return new Promise(r=>setTimeout(r,ms/getSpeed()))}
function scrollB(){screen.scrollTop=screen.scrollHeight}
function addLine(h){const d=document.createElement('div');d.className='line';d.innerHTML=h;screen.appendChild(d);scrollB()}
function addBlank(){addLine('&nbsp;')}
async function typeText(t,c='cmd'){const s=document.createElement('span');s.className=c;(screen.lastElementChild||screen).appendChild(s);for(let i=0;i<t.length;i++){s.textContent+=t[i];scrollB();await sleep(40)}}
function speak(text){return new Promise(async(resolve)=>{narrationText.textContent=text;if(!voiceEnabled){resolve();return}const apiKey=document.getElementById('apiKey').value.trim();if(!apiKey){const u=new SpeechSynthesisUtterance(text);u.rate=Math.min(getSpeed(),1.3);u.pitch=0.85;u.onend=()=>resolve();u.onerror=()=>resolve();speechSynthesis.speak(u);return}speakerIcon.classList.add('speaking');try{const r=await fetch('https://api.openai.com/v1/audio/speech',{method:'POST',headers:{'Authorization':'Bearer '+apiKey,'Content-Type':'application/json'},body:JSON.stringify({model:'tts-1-hd',input:text,voice:'onyx',response_format:'mp3',speed:Math.min(Math.max(getSpeed(),0.25),2.0)})});if(!r.ok)throw new Error(r.status);const b=await r.blob(),u=URL.createObjectURL(b),a=new Audio(u);currentAudio=a;a.onended=()=>{speakerIcon.classList.remove('speaking');URL.revokeObjectURL(u);currentAudio=null;resolve()};a.onerror=()=>{speakerIcon.classList.remove('speaking');URL.revokeObjectURL(u);currentAudio=null;resolve()};a.play()}catch(e){console.warn('TTS failed:',e);speakerIcon.classList.remove('speaking');currentAudio=null;resolve()}})}
async function narrate(t,p=500){await speak(t);await sleep(p)}
async function showPrompt(){addLine('<span class="prompt">➜</span> <span class="cyan">~/my-ai-project</span> ')}
async function typeCommand(c){await showPrompt();await typeText(c);await sleep(200);addBlank()}
function scanRow(a,d,s,sc,dt){return'  <span class="dim">'+a+'</span>  <span class="dim">│</span>  <span class="dim">'+d+'</span>  <span class="dim">│</span>  <span class="'+sc+' bold">'+s+'</span>  <span class="dim">'+dt+'</span>'}
async function startDemo(){if(running)return;running=true;startBtn.disabled=true;startBtn.textContent='● Running...';screen.innerHTML='';await sleep(300);
await narrate("Welcome to AIR Blackbox. The open-source compliance layer for AI agents.",800);
addLine('<span class="white">  ╔══════════════════════════════════════════════════╗</span>');addLine('<span class="white">  ║  <span class="red">■</span> AIR Blackbox — EU AI Act Compliance Scanner  ║</span>');addLine('<span class="white">  ║    Open-source compliance for AI agents          ║</span>');addLine('<span class="white">  ╚══════════════════════════════════════════════════╝</span>');addBlank();
await narrate("The EU AI Act takes full effect on August 2nd, 2026. If you're shipping AI agents into the EU, your code needs to comply with 6 articles, or face fines up to 35 million euros.",1000);
await narrate("Let me show you how it works. Here's a typical LangChain project.",800);
await typeCommand('ls');addLine('<span class="dim">agent.py    chains.py    requirements.txt    .env</span>');await sleep(600);
await narrate("Let's look at the agent code.",400);
await typeCommand('cat agent.py');addLine('<span class="dim">from langchain.agents import AgentExecutor</span>');addLine('<span class="dim">from langchain_openai import ChatOpenAI</span>');addLine('<span class="dim">from langchain.tools import tool</span>');addBlank();addLine('<span class="dim">llm = ChatOpenAI(model="gpt-4")</span>');addBlank();addLine('<span class="dim">@tool</span>');addLine('<span class="dim">def search_database(query: str) -> str:</span>');addLine('<span class="dim">    """Search the customer database"""</span>');addLine('<span class="dim">    return db.query(query)</span>');addBlank();addLine('<span class="dim">agent = AgentExecutor(agent=llm, tools=[search_database])</span>');addLine('<span class="dim">result = agent.invoke({"input": "Find all EU customers"})</span>');
await narrate("Standard LangChain agent. Talks to GPT-4, queries a customer database. Nothing unusual. But is it compliant?",1000);
await narrate("Let's install the scanner and find out.",400);
await typeCommand('pip install air-compliance');addLine('<span class="dim">Collecting air-compliance</span>');addLine('<span class="dim">  Downloading air_compliance-0.2.0-py3-none-any.whl (18 kB)</span>');addLine('<span class="green">Successfully installed air-compliance-0.2.0</span>');await sleep(600);
await narrate("Now let's scan the project against the EU AI Act.",600);
await typeCommand('air-compliance scan .');await sleep(400);
addBlank();addLine('<span class="white bold">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>');addLine('<span class="white bold">  AIR Blackbox Compliance Scanner v0.2.0</span>');addLine('<span class="white bold">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>');addBlank();
addLine('<span class="dim">Scanning project...</span>');await sleep(300);addLine('  <span class="cyan">↳</span> Found <span class="white">agent.py</span> — LangChain agent detected');await sleep(200);addLine('  <span class="cyan">↳</span> Found <span class="white">chains.py</span> — LangChain chains detected');await sleep(200);addLine('  <span class="cyan">↳</span> Found <span class="white">requirements.txt</span> — langchain>=0.1.0');await sleep(200);addLine('  <span class="yellow">↳</span> <span class="yellow">No AIR trust wrapper detected</span>');addBlank();
await narrate("It found LangChain, but no compliance wrapper. Here come the results.",800);
addLine('<span class="white bold">  EU AI Act Compliance Report</span>');addLine('<span class="dim">  ─────────────────────────────────────────────────</span>');addBlank();
await sleep(400);addLine(scanRow('Article  9','Risk Management       ','FAIL','red','No risk classification found'));await sleep(500);addLine(scanRow('Article 10','Data Governance        ','FAIL','red','No input validation on agent tools'));await sleep(500);addLine(scanRow('Article 11','Technical Documentation','WARN','yellow','Missing model card'));await sleep(500);addLine(scanRow('Article 12','Record-Keeping         ','FAIL','red','No tamper-evident logging'));await sleep(500);addLine(scanRow('Article 14','Human Oversight        ','FAIL','red','No human-in-the-loop controls'));await sleep(500);addLine(scanRow('Article 15','Accuracy & Robustness  ','FAIL','red','No drift detection'));addBlank();
addLine('<span class="dim">  ─────────────────────────────────────────────────</span>');addLine('  <span class="white bold">Coverage:</span> <span class="red bold">0%</span>  │  <span class="red">5 FAIL</span>  <span class="yellow">1 WARN</span>  <span class="green">0 PASS</span>');addBlank();addLine('  <span class="red bold">⚠  This project is NOT compliant with the EU AI Act</span>');addLine('  <span class="dim">Enforcement: August 2, 2026 — Fines up to €35M or 7% revenue</span>');addBlank();
await narrate("Zero percent technical coverage. 5 failures across 6 articles. Without these controls, your agent has gaps an auditor will flag.",1500);
await narrate("Now here is the key part. The technical layer is just two lines of code.",1000);
await typeCommand('pip install air-langchain-trust');addLine('<span class="dim">Collecting air-langchain-trust</span>');addLine('<span class="dim">  Downloading air_langchain_trust-0.1.0-py3-none-any.whl (42 kB)</span>');addLine('<span class="green">Successfully installed air-langchain-trust-0.1.0</span>');await sleep(800);
await narrate("We install the trust wrapper for LangChain. Now watch the code change.",600);
await typeCommand('cat agent.py');addLine('<span class="green bold">from air_langchain_trust import AirLangchainTrust</span>');addLine('<span class="dim">from langchain.agents import AgentExecutor</span>');addLine('<span class="dim">from langchain_openai import ChatOpenAI</span>');addLine('<span class="dim">from langchain.tools import tool</span>');addBlank();addLine('<span class="green bold">air = AirLangchainTrust()</span>');addLine('<span class="dim">llm = ChatOpenAI(model="gpt-4")</span>');addBlank();addLine('<span class="dim">@tool</span>');addLine('<span class="dim">def search_database(query: str) -> str:</span>');addLine('<span class="dim">    """Search the customer database"""</span>');addLine('<span class="dim">    return db.query(query)</span>');addBlank();addLine('<span class="green bold">agent = air.wrap(AgentExecutor(agent=llm, tools=[search_database]))</span>');addLine('<span class="dim">result = agent.invoke({"input": "Find all EU customers"})</span>');addBlank();
await narrate("Line 1: import the trust wrapper. Line 2: wrap your agent. That's it. Your existing code stays the same. No refactoring. No new dependencies.",1500);
await narrate("Let's scan again.",600);
await typeCommand('air-compliance scan .');await sleep(400);
addBlank();addLine('<span class="white bold">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>');addLine('<span class="white bold">  AIR Blackbox Compliance Scanner v0.2.0</span>');addLine('<span class="white bold">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>');addBlank();
addLine('<span class="dim">Scanning project...</span>');await sleep(200);addLine('  <span class="cyan">↳</span> Found <span class="white">agent.py</span> — LangChain agent + <span class="green">AirLangchainTrust</span>');addLine('  <span class="cyan">↳</span> Found <span class="white">chains.py</span> — LangChain chains detected');addLine('  <span class="cyan">↳</span> Found <span class="white">requirements.txt</span> — air-langchain-trust>=0.1.0');addBlank();
addLine('<span class="white bold">  EU AI Act Compliance Report</span>');addLine('<span class="dim">  ─────────────────────────────────────────────────</span>');addBlank();
await sleep(400);addLine(scanRow('Article  9','Risk Management       ','PASS','green','Risk classification via trust wrapper'));await sleep(300);addLine(scanRow('Article 10','Data Governance        ','PASS','green','Input validation + schema enforcement'));await sleep(300);addLine(scanRow('Article 11','Technical Documentation','PASS','green','Auto-generated model card'));await sleep(300);addLine(scanRow('Article 12','Record-Keeping         ','PASS','green','HMAC-SHA256 tamper-evident chain ✓'));await sleep(300);addLine(scanRow('Article 14','Human Oversight        ','PASS','green','Kill switch + approval gates'));await sleep(300);addLine(scanRow('Article 15','Accuracy & Robustness  ','PASS','green','Drift detection + monitoring active'));addBlank();
addLine('<span class="dim">  ─────────────────────────────────────────────────</span>');addLine('  <span class="white bold">Coverage:</span> <span class="green bold">6/6</span>  │  <span class="red">0 FAIL</span>  <span class="yellow">0 WARN</span>  <span class="green">6 PASS</span>');addBlank();addLine('  <span class="green bold">✓  Technical requirements covered — pair with organizational compliance</span>');addBlank();
await narrate("6 of 6 technical checks passing. The code layer is covered. Compliance also requires process and documentation — this handles the engineering side.",1500);
await narrate("AIR Blackbox supports LangChain, CrewAI, OpenAI Agents, AutoGen, and RAG pipelines. Everything is open-source, zero external dependencies, and installs from PyPI.",1500);
addLine('<span class="dim">  ─────────────────────────────────────────────────</span>');addBlank();addLine('  <span class="white bold">github.com/airblackbox</span>  │  <span class="white bold">airblackbox.ai</span>');addLine('  <span class="dim">pip install air-compliance</span>');addBlank();
await narrate("Star the repo on GitHub, or visit airblackbox.ai to get started. This covers the code layer — pair it with your compliance process for full coverage. The deadline is real. The technical fix is the easy part.",1200);
narrationText.textContent="Demo complete. Press Start Demo to replay.";startBtn.disabled=false;startBtn.textContent='↻ Replay Demo';running=false}
if(window.speechSynthesis){speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices()}
document.getElementById('apiKey').addEventListener('change',e=>{if(e.target.value)localStorage.setItem('oai_key',e.target.value)});const sk=localStorage.getItem('oai_key');if(sk)document.getElementById('apiKey').value=sk;
</script>
</body>
</html>
